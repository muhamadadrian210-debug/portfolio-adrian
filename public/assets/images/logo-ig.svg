    <path d="M 32 0 L 8 13.8 L 8 32 L 14 35.5 L 14 17.3 L 32 6.9 L 50 17.3 L 50 25 L 56 21.5 L 56 13.8 L 32 0 Z" fill="#F7931E" />
    
